<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280,height=720">
<title>Briefed v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    width: 1280px; height: 720px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
  }
  .agent-name { font-size: 28px; font-weight: 600; color: #fff; margin-bottom: 12px; }
  .status { font-size: 16px; color: #888; margin-bottom: 24px; transition: color 0.3s; }
  .status.listening { color: #4ade80; }
  .status.thinking  { color: #facc15; }
  .status.speaking  { color: #60a5fa; }
  .status.error     { color: #f87171; }
  .indicator {
    width: 48px; height: 48px; border-radius: 50%;
    background: #1e1e2e; border: 2px solid #333;
    margin-bottom: 20px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .indicator.speaking {
    border-color: #60a5fa; box-shadow: 0 0 20px rgba(96,165,250,0.4);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(96,165,250,0.3); }
    50%      { box-shadow: 0 0 40px rgba(96,165,250,0.6); }
  }
  .hand {
    font-size: 64px; line-height: 1; margin-bottom: 16px;
    display: none; transform-origin: 70% 100%;
  }
  .hand.raised { display: block; animation: wave 1.1s ease-in-out infinite; }
  @keyframes wave {
    0%, 100% { transform: rotate(-8deg); }
    50%      { transform: rotate(12deg); }
  }
  .debug { font-size: 11px; color: #555; margin-top: 8px; max-width: 1000px; text-align: center; }
</style>
</head>
<body>
<div class="hand" id="hand">✋</div>
<div class="indicator" id="indicator"></div>
<div class="agent-name" id="agentName">Briefed</div>
<div class="status listening" id="status">Connecting...</div>
<div class="debug" id="debug"></div>
<audio id="output" autoplay></audio>

<script>
// ─── Config from query string ────────────────────────────────────────────────
const P = new URLSearchParams(location.search);
const MEETING_ID = P.get('meeting_id') || '';
const AGENT_NAME = P.get('agent_name') || 'Briefed';
const BACKEND_WS = P.get('backend_ws') || '';   // e.g. wss://api.briefed.com
const TOKEN      = P.get('token')      || '';
// Meeting audio now arrives at the backend via a server-side Recall websocket
// (audio_mixed_raw.data), NOT via this page's mic — Recall doesn't feed meeting
// audio into the output-media webpage's getUserMedia. So capture is OFF by
// default; pass ?capture=1 only for legacy experiments.
const CAPTURE    = P.get('capture') === '1';

document.getElementById('agentName').textContent = AGENT_NAME;

const statusEl = document.getElementById('status');
const indEl    = document.getElementById('indicator');
const dbgEl    = document.getElementById('debug');
const handEl   = document.getElementById('hand');

function dbg(msg) { dbgEl.textContent = msg; console.log('[v2]', msg); }
function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = 'status ' + cls;
  indEl.className = 'indicator ' + cls;
}

// ─── Audio pipeline ─────────────────────────────────────────────────────────
//
//   Meeting audio → MediaStreamTrackProcessor → AudioData (Float32, 48kHz typical)
//                 → downsample to 16kHz mono S16LE
//                 → WebSocket(binary) → backend Pipecat
//
//   backend → WebSocket(binary PCM16 24kHz mono)
//          → AudioBuffer queue → AudioContext destination → meeting hears bot
//
const INPUT_SAMPLE_RATE  = 16000;   // Deepgram wants 16kHz
const OUTPUT_SAMPLE_RATE = 24000;   // ElevenLabs default
const FRAME_SAMPLES      = 320;     // 20ms at 16kHz

let ws = null;
let audioCtx = null;            // for OUTPUT playback (24kHz)
let nextPlayTime = 0;           // scheduling cursor for output audio chunks
let captureTask = null;         // promise that pumps capture loop

// ─── Backend WebSocket ──────────────────────────────────────────────────────
function connectBridge() {
  const url = BACKEND_WS.replace(/\/$/, '') + '/ws/bot-bridge/' + MEETING_ID + '?token=' + encodeURIComponent(TOKEN);
  dbg('connecting ' + url);

  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    dbg('bridge open');
    setStatus('Listening...', 'listening');
    if (CAPTURE) startCapture();  // legacy only; meeting audio comes server-side now
  };

  ws.onmessage = (e) => {
    if (typeof e.data === 'string') {
      try {
        const msg = JSON.parse(e.data);
        handleControlMessage(msg);
      } catch (_) { /* ignore */ }
      return;
    }
    // Binary: PCM16 24kHz mono from ElevenLabs
    playPcm16(e.data);
  };

  ws.onerror = () => { dbg('bridge error'); setStatus('Connection error', 'error'); };
  ws.onclose = () => {
    dbg('bridge closed; reconnecting in 3s');
    setStatus('Reconnecting...', 'error');
    setTimeout(connectBridge, 3000);
  };
}

function handleControlMessage(msg) {
  if (msg.type === 'bot_state') {
    setStatus(msg.speaking ? 'Speaking...' : 'Listening...', msg.speaking ? 'speaking' : 'listening');
  } else if (msg.type === 'hand') {
    // Bora is politely requesting permission to speak (visible in the meeting).
    handEl.classList.toggle('raised', !!msg.raised);
    if (msg.raised) setStatus('Raising hand…', 'thinking');
  }
}

// ─── Capture: meeting audio → backend ───────────────────────────────────────
async function startCapture() {
  try {
    // Recall auto-grants the mic permission inside the bot's Chrome.
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const track = stream.getAudioTracks()[0];
    dbg('got meeting audio track');

    const processor = new MediaStreamTrackProcessor({ track });
    const reader = processor.readable.getReader();

    // We resample by reading AudioData chunks (typically 48kHz) and feeding a
    // small in-place downsampler. Simpler: pull at the source rate and
    // average-downsample to 16kHz.
    let leftover = new Float32Array(0);

    captureTask = (async () => {
      while (true) {
        const { value: audioData, done } = await reader.read();
        if (done) break;
        if (ws == null || ws.readyState !== WebSocket.OPEN) {
          audioData.close();
          continue;
        }
        const srcRate = audioData.sampleRate;
        const numFrames = audioData.numberOfFrames;
        const channels = audioData.numberOfChannels;

        // Pull Float32 from channel 0 only (meeting audio is mono in Recall)
        const f32 = new Float32Array(numFrames);
        audioData.copyTo(f32, { planeIndex: 0, format: 'f32', frameCount: numFrames });
        audioData.close();

        // Concatenate leftover + new
        const combined = new Float32Array(leftover.length + f32.length);
        combined.set(leftover);
        combined.set(f32, leftover.length);

        // Downsample by simple decimation: take every (srcRate / 16000)th sample.
        // For higher quality use a proper polyphase filter; this is fine for STT.
        const ratio = srcRate / INPUT_SAMPLE_RATE;
        const outLen = Math.floor(combined.length / ratio);
        const downsampled = new Float32Array(outLen);
        for (let i = 0; i < outLen; i++) {
          downsampled[i] = combined[Math.floor(i * ratio)];
        }

        // Stash unconsumed tail
        const consumed = Math.floor(outLen * ratio);
        leftover = combined.slice(consumed);

        // Float32 → Int16 LE
        const pcm16 = new Int16Array(downsampled.length);
        for (let i = 0; i < downsampled.length; i++) {
          const s = Math.max(-1, Math.min(1, downsampled[i]));
          pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        ws.send(pcm16.buffer);
      }
    })();
  } catch (err) {
    dbg('capture error: ' + err.message);
    setStatus('No audio access', 'error');
  }
}

// ─── Playback: backend → meeting ────────────────────────────────────────────
//
// IMPORTANT: Recall's output-media captures the bot-page's audio from a MEDIA
// ELEMENT's output (the <audio> tag), NOT from the Web Audio default
// destination (ctx.destination / "speakers"). In Recall's headless Chrome there
// is no real speaker, so audio sent only to ctx.destination is never heard in
// the meeting. We therefore route Web Audio through a MediaStreamDestination and
// attach that stream to <audio id="output" autoplay>, which Recall does capture.
// We also resume() the context (it can start 'suspended').
let mediaDest = null;       // MediaStreamAudioDestinationNode
const outputEl = document.getElementById('output');

function ensureAudioCtx() {
  if (audioCtx) return audioCtx;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: OUTPUT_SAMPLE_RATE });
  // Route to a captured MediaStream (Recall records the <audio> element).
  mediaDest = audioCtx.createMediaStreamDestination();
  outputEl.srcObject = mediaDest.stream;
  outputEl.play && outputEl.play().catch(() => {});
  nextPlayTime = audioCtx.currentTime;
  return audioCtx;
}

function playPcm16(arrayBuffer) {
  const ctx = ensureAudioCtx();
  if (ctx.state === 'suspended') ctx.resume().catch(() => {});

  const int16 = new Int16Array(arrayBuffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 0x8000;

  const buf = ctx.createBuffer(1, float32.length, OUTPUT_SAMPLE_RATE);
  buf.copyToChannel(float32, 0);

  const source = ctx.createBufferSource();
  source.buffer = buf;
  // Feed BOTH the captured media stream (what Recall hears) and the default
  // destination (harmless, helps local debugging via Remote DevTools).
  source.connect(mediaDest);
  try { source.connect(ctx.destination); } catch (_) {}

  // Schedule chunks sequentially with no gap.
  const now = ctx.currentTime;
  const startAt = Math.max(nextPlayTime, now);
  source.start(startAt);
  nextPlayTime = startAt + buf.duration;
}

// ─── Init ───────────────────────────────────────────────────────────────────
if (!MEETING_ID || !BACKEND_WS || !TOKEN) {
  setStatus('Missing configuration', 'error');
  dbg('need meeting_id, backend_ws, token');
} else {
  connectBridge();
}
</script>
</body>
</html>
